services:
  cua-environment:
    container_name: cua-environment
    image: cua-ubuntu:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - DISPLAY=:99
      - SCREEN_WIDTH=1440
      - SCREEN_HEIGHT=900
      - SCREEN_DEPTH=24
      - AGENT_SERVICE_PORT=9222
      - AGENT_MODE=desktop
      - CUA_ALLOW_NOPW=1
      # - VNC_PASSWORD=changeme   # uncomment to require VNC auth
    ports:
      - "127.0.0.1:5900:5900"
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:9222:9222"
      - "127.0.0.1:9223:9223"
    shm_size: "2gb"
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # D4 — drop all Linux capabilities. The agent runs as non-root UID 1000
    # and only needs userspace syscalls (X11, DBus session bus, HTTP,
    # subprocess spawn). No net-admin / raw-socket / mount / ptrace needed.
    # If a feature ever regresses, re-add the specific capability via
    # cap_add — never re-enable the whole set.
    cap_drop:
      - ALL
    # D4 — ephemeral writable areas. Everything else stays on the image
    # layer. We intentionally do NOT set read_only: true at the
    # container level because Chrome profile seeding, DBus session bus,
    # x11vnc log, and websockify all expect writable paths across the
    # image; tightening those would need a dedicated H1 follow-up.
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var/run:size=16m,mode=1777
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"
          pids: 256
    # D5 — fork-bomb / fd-flood mitigation at the container boundary.
    # The desktop session (XFCE + Chrome + xdotool helpers) sits well
    # under 256 processes and a few hundred fds in normal operation.
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    healthcheck:
      # Verify the in-container agent service is responding.
      # (Backend /api/health is a separate process outside compose.)
      # D3 — start_period already covers the ~15-25s between container
      # start and X11/DBus/XFCE being ready; kept at 30s for margin.
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:9222/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

