<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="feGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="beGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="dkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" rx="12" fill="#fafbfc"/>

  <!-- Title bar -->
  <rect width="1100" height="56" rx="12" fill="url(#headerGrad)"/>
  <rect y="44" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="550" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="600">CUA — High-Level Architecture</text>

  <!-- ==================== HOST REGION ==================== -->
  <rect x="30" y="76" width="700" height="520" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 4"/>
  <rect x="40" y="68" width="120" height="22" rx="4" fill="#f1f5f9"/>
  <text x="100" y="83" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">HOST MACHINE</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="60" y="108" width="160" height="72" rx="10" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
    <circle cx="140" cy="130" r="12" fill="#0ea5e9" opacity="0.15"/>
    <text x="140" y="135" text-anchor="middle" fill="#0ea5e9" font-size="14">👤</text>
    <text x="140" y="157" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">User Browser</text>
    <text x="140" y="172" text-anchor="middle" fill="#64748b" font-size="10">localhost:3000</text>
  </g>

  <!-- Frontend -->
  <g filter="url(#shadow)">
    <rect x="60" y="220" width="160" height="100" rx="10" fill="url(#feGrad)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="140" y="248" text-anchor="middle" fill="#0c4a6e" font-size="13" font-weight="700">Frontend</text>
    <text x="140" y="268" text-anchor="middle" fill="#0369a1" font-size="11">React 19 / Vite 6</text>
    <line x1="80" y1="280" x2="200" y2="280" stroke="#0284c7" stroke-width="0.5" opacity="0.4"/>
    <text x="140" y="296" text-anchor="middle" fill="#475569" font-size="10">REST client · WS client</text>
    <text x="140" y="310" text-anchor="middle" fill="#475569" font-size="10">noVNC embed · Router</text>
  </g>

  <!-- Backend -->
  <g filter="url(#shadow)">
    <rect x="60" y="370" width="310" height="210" rx="10" fill="url(#beGrad)" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="215" y="398" text-anchor="middle" fill="#4c1d95" font-size="13" font-weight="700">Backend — FastAPI :8000</text>
    <line x1="80" y1="408" x2="350" y2="408" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>

    <!-- Backend sub-modules -->
    <rect x="78" y="420" width="130" height="34" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
    <text x="143" y="441" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">server.py</text>
    <text x="143" y="450" text-anchor="middle" fill="#7c3aed" font-size="8">Routes · WS · VNC proxy</text>

    <rect x="224" y="420" width="130" height="34" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
    <text x="289" y="441" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">engine.py</text>
    <text x="289" y="450" text-anchor="middle" fill="#7c3aed" font-size="8">CU Engine · Executors</text>

    <rect x="78" y="466" width="130" height="34" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
    <text x="143" y="487" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">agent/loop.py</text>
    <text x="143" y="496" text-anchor="middle" fill="#7c3aed" font-size="8">AgentLoop orchestrator</text>

    <rect x="224" y="466" width="130" height="34" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
    <text x="289" y="487" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">config.py</text>
    <text x="289" y="496" text-anchor="middle" fill="#7c3aed" font-size="8">Config · Key resolution</text>

    <rect x="78" y="512" width="130" height="34" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
    <text x="143" y="533" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">docker_manager.py</text>
    <text x="143" y="542" text-anchor="middle" fill="#7c3aed" font-size="8">Container lifecycle</text>

    <rect x="224" y="512" width="130" height="34" rx="6" fill="white" stroke="#a78bfa" stroke-width="1"/>
    <text x="289" y="533" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">models.py</text>
    <text x="289" y="542" text-anchor="middle" fill="#7c3aed" font-size="8">Pydantic schemas</text>
  </g>

  <!-- ==================== DOCKER REGION ==================== -->
  <g filter="url(#shadow)">
    <rect x="420" y="108" width="300" height="470" rx="10" fill="url(#dkGrad)" stroke="#d97706" stroke-width="1.5"/>
    <text x="570" y="136" text-anchor="middle" fill="#78350f" font-size="13" font-weight="700">Docker Container — Ubuntu 24.04</text>
    <line x1="440" y1="146" x2="700" y2="146" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>

    <!-- Xvfb -->
    <rect x="440" y="160" width="260" height="42" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
    <text x="570" y="180" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">Xvfb :99 + XFCE 4 Desktop</text>
    <text x="570" y="195" text-anchor="middle" fill="#a16207" font-size="9">1440×900×24 virtual display</text>

    <!-- VNC stack -->
    <rect x="440" y="214" width="125" height="42" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
    <text x="502" y="234" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">x11vnc :5900</text>
    <text x="502" y="249" text-anchor="middle" fill="#a16207" font-size="9">VNC server</text>

    <rect x="575" y="214" width="125" height="42" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
    <text x="638" y="234" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">noVNC :6080</text>
    <text x="638" y="249" text-anchor="middle" fill="#a16207" font-size="9">websockify</text>

    <!-- Agent service -->
    <rect x="440" y="272" width="260" height="56" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="570" y="296" text-anchor="middle" fill="#92400e" font-size="12" font-weight="700">agent_service.py :9222</text>
    <text x="570" y="314" text-anchor="middle" fill="#a16207" font-size="9">/action · /screenshot · /health · /mode</text>

    <!-- Mode boxes -->
    <rect x="440" y="345" width="125" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="502" y="368" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">🌐 Browser Mode</text>
    <text x="502" y="383" text-anchor="middle" fill="#2563eb" font-size="9">Playwright CDP</text>
    <text x="502" y="396" text-anchor="middle" fill="#2563eb" font-size="9">page.mouse/keyboard</text>

    <rect x="575" y="345" width="125" height="60" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
    <text x="638" y="368" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="600">🖥️ Desktop Mode</text>
    <text x="638" y="383" text-anchor="middle" fill="#a16207" font-size="9">xdotool + scrot</text>
    <text x="638" y="396" text-anchor="middle" fill="#a16207" font-size="9">any X11 app</text>

    <!-- Chromium -->
    <rect x="440" y="420" width="260" height="42" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
    <text x="570" y="440" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">Chromium — CDP :9223</text>
    <text x="570" y="455" text-anchor="middle" fill="#a16207" font-size="9">Google Chrome + Playwright browser</text>

    <!-- Installed software -->
    <rect x="440" y="478" width="260" height="42" rx="6" fill="#fefce8" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
    <text x="570" y="496" text-anchor="middle" fill="#78350f" font-size="9">Pre-installed: Chrome · LibreOffice · VLC · gedit</text>
    <text x="570" y="510" text-anchor="middle" fill="#78350f" font-size="9">xclip · wmctrl · ffmpeg · Node.js 20</text>

    <!-- Resource limits badge -->
    <rect x="440" y="530" width="260" height="26" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
    <text x="570" y="547" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="600">⚙️ 4 GB RAM · 2 CPUs · no-new-privileges · 127.0.0.1 only</text>
  </g>

  <!-- ==================== LLM CLOUD ==================== -->
  <g filter="url(#shadow)">
    <rect x="790" y="200" width="270" height="200" rx="16" fill="url(#llmGrad)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="925" y="228" text-anchor="middle" fill="#831843" font-size="13" font-weight="700">☁️ LLM Cloud APIs</text>
    <line x1="810" y1="238" x2="1040" y2="238" stroke="#ec4899" stroke-width="0.5" opacity="0.4"/>

    <!-- Gemini -->
    <rect x="810" y="252" width="230" height="46" rx="6" fill="white" stroke="#db2777" stroke-width="1"/>
    <text x="828" y="273" fill="#4285F4" font-size="14" font-weight="700">G</text>
    <text x="848" y="273" fill="#1e293b" font-size="11" font-weight="600">Google Gemini</text>
    <text x="848" y="290" fill="#64748b" font-size="9">google-genai SDK · function_call protocol</text>

    <!-- Claude -->
    <rect x="810" y="310" width="230" height="46" rx="6" fill="white" stroke="#db2777" stroke-width="1"/>
    <text x="828" y="331" fill="#CC785C" font-size="14" font-weight="700">C</text>
    <text x="848" y="331" fill="#1e293b" font-size="11" font-weight="600">Anthropic Claude</text>
    <text x="848" y="348" fill="#64748b" font-size="9">anthropic SDK · tool_use (CU beta) protocol</text>

    <!-- Native CU badge -->
    <rect x="855" y="366" width="140" height="22" rx="11" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <text x="925" y="381" text-anchor="middle" fill="#166534" font-size="9" font-weight="600">✅ Native CU Protocols</text>
  </g>

  <!-- ==================== ARROWS ==================== -->
  <!-- User → Frontend -->
  <line x1="140" y1="180" x2="140" y2="220" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="170" y="204" fill="#0369a1" font-size="9" font-weight="500">HTTP :3000</text>

  <!-- Frontend → Backend -->
  <line x1="140" y1="320" x2="140" y2="370" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="160" y="350" fill="#6d28d9" font-size="9" font-weight="500">REST + WS</text>

  <!-- Backend → Agent Service -->
  <line x1="370" y1="475" x2="440" y2="300" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrowAmber)"/>
  <text x="380" y="370" fill="#b45309" font-size="9" font-weight="500" transform="rotate(-36,380,370)">HTTP /action /screenshot</text>

  <!-- Backend → LLM -->
  <line x1="370" y1="440" x2="790" y2="310" stroke="#ec4899" stroke-width="1.8" marker-end="url(#arrowPink)" stroke-dasharray="6 3"/>
  <text x="560" y="395" fill="#be185d" font-size="9" font-weight="500">SDK calls (screenshots + tasks)</text>

  <!-- Backend → noVNC proxy -->
  <line x1="370" y1="510" x2="575" y2="235" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowAmber)" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="440" y="340" fill="#a16207" font-size="8" transform="rotate(-42,440,340)">/vnc proxy</text>

  <!-- Backend → CDP -->
  <line x1="370" y1="530" x2="440" y2="441" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowBlueD)" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="382" y="498" fill="#2563eb" font-size="8" transform="rotate(-50,382,498)">CDP :9223</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ec4899"/>
    </marker>
    <marker id="arrowBlueD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>