    <text x="475" y="500" text-anchor="middle" fill="#831843" font-size="11" font-weight="700">☁️ LLM Cloud APIs</text>
    <rect x="344" y="508" width="130" height="22" rx="4" fill="white" stroke="#f9a8d4" stroke-width="0.8"/>
    <text x="356" y="523" fill="#4285F4" font-size="9" font-weight="700">G</text>
    <text x="370" y="523" fill="#475569" font-size="9">Google Gemini</text>
    <rect x="480" y="508" width="130" height="22" rx="4" fill="white" stroke="#f9a8d4" stroke-width="0.8"/>
