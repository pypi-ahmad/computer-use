  <rect x="449" y="442" width="52" height="16" rx="3" fill="white" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="475" y="454" text-anchor="middle" fill="#be185d" font-size="8" font-weight="500">SDK</text>

  <!-- Backend → Docker (CDP) -->
  <line x1="618" y1="210" x2="682" y2="386" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrB)" stroke-dasharray="3 2" opacity="0.5"/>

