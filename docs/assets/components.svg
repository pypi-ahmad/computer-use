  <rect x="20" y="86" width="260" height="10" fill="#3b82f6"/>
  <text x="150" y="88" text-anchor="middle" fill="white" font-size="12" font-weight="700">FRONTEND — React 19</text>

  <!-- Pages -->
  <text x="36" y="118" fill="#1e40af" font-size="10" font-weight="700">Pages</text>
