  <line x1="280" y1="308" x2="332" y2="148" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrB)"/>
  <rect x="284" y="208" width="52" height="16" rx="3" fill="white" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="310" y="220" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="500">REST</text>

