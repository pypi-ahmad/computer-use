  <rect x="284" y="232" width="36" height="16" rx="3" fill="white" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="302" y="244" text-anchor="middle" fill="#7c3aed" font-size="8" font-weight="500">WS</text>

