<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arrowE" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <rect width="900" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect y="40" width="900" height="12" fill="url(#headerGrad)"/>
  <text x="450" y="34" text-anchor="middle" fill="white" font-size="17" font-weight="600">Agent Execution Flow — Perceive → Think → Act</text>

  <!-- ============ STEP 1: USER REQUEST ============ -->
  <g filter="url(#shadow)">
    <rect x="310" y="72" width="280" height="52" rx="10" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="326" y="101" fill="#0ea5e9" font-size="16">👤</text>
    <text x="350" y="97" fill="#1e293b" font-size="12" font-weight="600">User enters task in the UI</text>
    <text x="350" y="113" fill="#64748b" font-size="9">Select provider, model, mode → Click Start</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="450" y1="124" x2="450" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- ============ STEP 2: VALIDATION ============ -->
  <g filter="url(#shadow)">
    <rect x="270" y="148" width="360" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="450" y="175" text-anchor="middle" fill="#92400e" font-size="12" font-weight="600">POST /api/agent/start → Validate &amp; Resolve</text>
    <text x="450" y="192" text-anchor="middle" fill="#a16207" font-size="9">Rate limit (10/min) · Model allowlist · API key resolution · Session cap (3)</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="450" y1="200" x2="450" y2="224" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- ============ STEP 3: CONTAINER ============ -->
  <g filter="url(#shadow)">
    <rect x="310" y="224" width="280" height="44" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="450" y="250" text-anchor="middle" fill="#0c4a6e" font-size="12" font-weight="600">🐳 Auto-start Docker container</text>
    <text x="450" y="263" text-anchor="middle" fill="#0369a1" font-size="9">Build if needed → Start → Wait for agent_service /health</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="450" y1="268" x2="450" y2="296" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- ============ PERCEPTION-ACTION LOOP ============ -->
  <rect x="50" y="296" width="800" height="308" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="0"/>
  <rect x="58" y="288" width="200" height="22" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="158" y="303" text-anchor="middle" fill="#166534" font-size="11" font-weight="700">PERCEIVE → THINK → ACT LOOP</text>
  <text x="770" y="303" text-anchor="middle" fill="#166534" font-size="10" font-weight="500">repeats up to max_steps</text>

  <!-- Step A: Perceive -->
  <g filter="url(#shadow)">
    <rect x="80" y="324" width="240" height="70" rx="10" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="80" y="324" width="240" height="26" rx="10" fill="#0ea5e9"/>
    <rect x="80" y="340" width="240" height="10" fill="#0ea5e9"/>
    <text x="200" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="700">1 — PERCEIVE</text>
    <text x="200" y="368" text-anchor="middle" fill="#1e293b" font-size="10">📸 Capture screenshot (PNG)</text>
    <text x="200" y="384" text-anchor="middle" fill="#64748b" font-size="9">agent_service /screenshot or docker exec scrot</text>
  </g>

  <!-- Arrow A→B -->
  <line x1="320" y1="360" x2="370" y2="360" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowP)"/>

  <!-- Step B: Think -->
  <g filter="url(#shadow)">
    <rect x="370" y="324" width="240" height="70" rx="10" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="370" y="324" width="240" height="26" rx="10" fill="#7c3aed"/>
    <rect x="370" y="340" width="240" height="10" fill="#7c3aed"/>
    <text x="490" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="700">2 — THINK</text>
    <text x="490" y="368" text-anchor="middle" fill="#1e293b" font-size="10">🧠 Send to LLM (Gemini / Claude)</text>
    <text x="490" y="384" text-anchor="middle" fill="#64748b" font-size="9">Screenshot + task + conversation history</text>
  </g>

  <!-- Arrow B→C -->
  <line x1="610" y1="360" x2="660" y2="360" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowE)"/>

  <!-- Step C: Act -->
  <g filter="url(#shadow)">
    <rect x="660" y="324" width="160" height="70" rx="10" fill="white" stroke="#059669" stroke-width="1.5"/>
    <rect x="660" y="324" width="160" height="26" rx="10" fill="#059669"/>
    <rect x="660" y="340" width="160" height="10" fill="#059669"/>
    <text x="740" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="700">3 — ACT</text>
    <text x="740" y="368" text-anchor="middle" fill="#1e293b" font-size="10">⚡ Execute CU action</text>
    <text x="740" y="384" text-anchor="middle" fill="#64748b" font-size="9">in Docker sandbox</text>
  </g>

  <!-- Loop-back arrow (Act → Perceive) -->
  <path d="M740,394 L740,420 Q740,440 720,440 L120,440 Q100,440 100,420 L100,394" fill="none" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowE)" stroke-dasharray="6 3"/>
  <text x="420" y="456" text-anchor="middle" fill="#166534" font-size="10" font-weight="500">Next step — loop back to perceive</text>

  <!-- Provider routing detail -->
  <g filter="url(#shadow)">
    <rect x="80" y="475" width="370" height="54" rx="8" fill="white" stroke="#94a3b8" stroke-width="1"/>
    <text x="96" y="496" fill="#4285F4" font-size="10" font-weight="700">G</text>
    <text x="112" y="496" fill="#475569" font-size="10" font-weight="500">Gemini — normalized 0-999 coords → function_call</text>
    <text x="96" y="518" fill="#CC785C" font-size="10" font-weight="700">C</text>
    <text x="112" y="518" fill="#475569" font-size="10" font-weight="500">Claude — real pixel coords → tool_use (beta)</text>
  </g>

  <!-- Execution mode detail -->
  <g filter="url(#shadow)">
    <rect x="480" y="475" width="350" height="54" rx="8" fill="white" stroke="#94a3b8" stroke-width="1"/>
    <text x="496" y="496" fill="#3b82f6" font-size="10" font-weight="700">🌐</text>
    <text x="516" y="496" fill="#475569" font-size="10" font-weight="500">Browser — Playwright CDP actions</text>
    <text x="496" y="518" fill="#eab308" font-size="10" font-weight="700">🖥️</text>
    <text x="516" y="518" fill="#475569" font-size="10" font-weight="500">Desktop — xdotool + scrot (any X11 app)</text>
  </g>

  <!-- Stream back to UI -->
  <g filter="url(#shadow)">
    <rect x="80" y="545" width="370" height="36" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
    <text x="265" y="568" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="500">📡 Each step → WS broadcast (screenshot, step, log)</text>
  </g>

  <!-- ============ TERMINAL STATES ============ -->
  <line x1="450" y1="604" x2="450" y2="624" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <g filter="url(#shadow)">
    <rect x="100" y="626" width="160" height="44" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="180" y="649" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">✅ Done</text>
    <text x="180" y="664" text-anchor="middle" fill="#15803d" font-size="9">Model returns "done"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="626" width="160" height="44" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="370" y="649" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="600">❌ Error</text>
    <text x="370" y="664" text-anchor="middle" fill="#b91c1c" font-size="9">3 failures / model error</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="626" width="160" height="44" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
    <text x="560" y="649" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="600">⏹️ Stopped</text>
    <text x="560" y="664" text-anchor="middle" fill="#a16207" font-size="9">User stop / max_steps</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="626" width="160" height="44" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="750" y="649" text-anchor="middle" fill="#6b21a8" font-size="11" font-weight="600">🔒 Safety</text>
    <text x="750" y="664" text-anchor="middle" fill="#7e22ce" font-size="9">Awaiting user confirm</text>
  </g>
</svg>